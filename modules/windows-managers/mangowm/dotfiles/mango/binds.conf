# reload config
bind=SUPER+ALT,r,reload_config

# exit
bind=SUPER,m,quit
bind=SUPER,q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,Left,focusdir,left
bind=SUPER,Right,focusdir,right
bind=SUPER,Up,focusdir,up
bind=SUPER,Down,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# movewin
bind=CTRL+ALT,Up,movewin,+0,-50
bind=CTRL+ALT,Down,movewin,+0,+50
bind=CTRL+ALT,Left,movewin,-50,+0
bind=CTRL+ALT,Right,movewin,+50,+0

# resizewin
bind=SUPER+ALT,Up,resizewin,+0,-50
bind=SUPER+ALT,Down,resizewin,+0,+50
bind=SUPER+ALT,Left,resizewin,-50,+0
bind=SUPER+ALT,Right,resizewin,+50,+0


# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=SUPER,v,togglefloating,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
#bind=ALT,e,set_proportion,1.0
bind=SUPER,r,switch_proportion_preset,
#bind=SUPER,c,centerwin,


# tile layout
bind=SUPER,e,incnmaster,1
bind=SUPER,x,incnmaster,-1
bind=ALT+SUPER,z,zoom,

# switch layout
bind=CTRL+SUPER,t,setlayout,tile
bind=CTRL+SUPER,s,setlayout,scroller
bind=SUPER,n,switch_layout

# tag switch
bind=SUPER+CTRL,Up,viewtoleft,0
bind=SUPER+CTRL,Down,viewtoright,0
bind=SUPER+CTRL,Left,tagtoleft,0
bind=SUPER+CTRL,Right,tagtoright,0
# bind=SUPER+CTRL,Left,viewtoleft_have_client,0
# bind=SUPER+CTRL,Right,viewtoright_have_client,0

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tag,1,0
# bind=Alt,2,tag,2,0
# bind=Alt,3,tag,3,0
# bind=Alt,4,tag,4,0
# bind=Alt,5,tag,5,0
# bind=Alt,6,tag,6,0
# bind=Alt,7,tag,7,0
# bind=Alt,8,tag,8,0
# bind=Alt,9,tag,9,0

# monitor switch
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
# bind=SUPER+Alt,Left,tagmon,left
# bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# Mouse Button Bindings
mousebind=SUPER,btn_left,moveresize,curmove
#mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize

# Axis Bindings
axisbind=SUPER,UP,focusdir,left
axisbind=SUPER,DOWN,focusdir,right

# Touchpad Gestures
# 3-finger: Window focus
gesturebind=none,left,3,focusdir,right
gesturebind=none,right,3,focusdir,left
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
# 4-finger: Workspace navigation
gesturebind=none,left,4,viewtoright_have_client
gesturebind=none,right,4,viewtoleft_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview

# Custom commands
mousebind=SUPER,btn_extra,spawn,bash equibop --toggle-mic

#AppLauncher
bind=SUPER,b,spawn,brave-origin-nightly
bind=SUPER,z,spawn,zeditor
bind=SUPER,d,spawn,nautilus
bind=SUPER,t,spawn,kitty
