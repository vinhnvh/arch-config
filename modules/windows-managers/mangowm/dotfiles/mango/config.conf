# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.66667,0.5,0.33333

# Master-Stack Layout Setting
new_is_master=0
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1

# Theming
cursor_size=12
cursor_theme=Bibata-Modern-Ice

# sub config loader
source=~/.config/mango/appearance.conf
source=~/.config/mango/animation.conf
source=~/.config/mango/binds.conf
source=~/.config/mango/effect.conf
source=~/.config/mango/env.conf
source=~/.config/mango/inputs.conf
source=~/.config/mango/noctaliakeybinds.conf
source=~/.config/mango/rules.conf

# autostart
exec=~/.config/mango/scripts/autostart.sh

# This sources the noctalia theme
source = /home/sazv/.config/mango/noctalia.conf
