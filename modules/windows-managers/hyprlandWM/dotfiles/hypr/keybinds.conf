###################
### KEYBINDINGS ###
###################

# Biến môi trường
$mainMod = SUPER # Sets "Windows" key as main modifier

# ============== General keybinds ==============
bind = $mainMod, T, exec, $terminal
bind = $mainMod, D, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, Z, exec, $editor
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, A, exec, qs -c noctalia-shell ipc call launcher toggle
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, F, fullscreen,
bind = $mainMod ALT, L, exec, qs -c noctalia-shell ipc call sessionMenu toggle

# ============== Windows management ==============
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus window with mainMod + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ============== Workspace management ==============
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod CTRL, S, movetoworkspace, special:magic

# workspace
bind = $mainMod CTRL, down, workspace, e+1
bind = $mainMod CTRL, up, workspace, e-1
#bind = $mainMod CTRL, right, movetoworkspace e-1
#bind = $mainMod CTRL, left, movetoworkspace e+1

# ============== Mouse bindings ==============
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# windows
bind = $mainMod, mouse_down, movefocus, r
bind = $mainMod, mouse_up, movefocus, l
bind = $mainMod+SHIFT, mouse_down, workspace, e-1
bind = $mainMod+SHIFT, mouse_up, workspace, e+1
#bind = $mainMod+CTRL, mouse_down, movetoworkspace, e-1
#bind = $mainMod+CTRL, mouse_up, movetoworkspace, e+1
# ============== Multimedia keys ==============
# Require noctalia-shell for IPC calls
bindel = ,XF86AudioRaiseVolume, exec, qs -c noctalia-shell ipc call volume increase
bindel = ,XF86AudioLowerVolume, exec, qs -c noctalia-shell ipc call volume decrease
bindel = ,XF86AudioMute, exec, qs -c noctalia-shell ipc call volume muteOutput
bindel = ,XF86AudioMicMute, exec, qs -c noctalia-shell ipc call volume muteInput
bindel = ,XF86MonBrightnessUp, exec, qs -c noctalia-shell ipc call brightness increase
bindel = ,XF86MonBrightnessDown, exec, qs -c noctalia-shell ipc call brightness decrease
bindl = , XF86AudioNext, exec, qs -c noctalia-shell ipc call media next
bindl = , XF86AudioPause, exec, qs -c noctalia-shell ipc call media playPause
bindl = , XF86AudioPlay, exec, qs -c noctalia-shell ipc call media playPause
bindl = , XF86AudioPrev, exec, qs -c noctalia-shell ipc call media previos

# ============== Custom keybinds ==============

bind = $mainMod, mouse:276, exec, equibop --toggle-mic
