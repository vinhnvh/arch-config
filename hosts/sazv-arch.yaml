host: sazv-arch
description: Gaming Laptop
import: []
enabled_modules:
- quickshells/noctalia-shell
- system-packages-sazv-arch
- ManyApps/Fcitx5-Lotus-enable
- ManyApps/apps-and-tools
- ManyApps/controller
- ManyApps/Gaming
- windows-managers/niriWM
- ManyApps/audio
- windows-managers/mangowm
packages:
- snapper
exclude: []
additional_packages: []
flatpak_scope: user
auto_prune: false
module_processing: parallel
strict_package_order: false
config_backups:
  enabled: true
  max_backups: 5
system_backups:
  enabled: true
  backup_on_sync: true
  backup_on_update: true
  tool: snapper
  snapper_config: root
  max_backups: 5
services:
  enabled: []
  disabled: []
  scope: system
enabled_service_profiles: []
update_hooks:
  pre_update: null
  post_update: null
  behavior: ask
  devel: false
  run_as_user: false
default_apps:
  scope: system
  browser: null
  text_editor: null
  file_manager: null
  terminal: null
  video_player: null
  audio_player: null
  image_viewer: null
  pdf_viewer: null
  mime_types: {}
theming:
  scope: user
  cursor: null
  icons: null
  theme: null
  dark_or_light: null
  font: null
  gtk: null
  qt: null
  env_vars: {}
editor: null
aur_helper: null
sync_sudo: false
auto_commit: false
